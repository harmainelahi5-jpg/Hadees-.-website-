<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50 Mashhoor Hadees</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Nastaliq Urdu', Arial; background: #f0f4f0; padding: 15px; margin: 0; }
        .container { max-width: 800px; margin: auto; }
        .hadees { background: white; padding: 20px; margin: 15px 0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-right: 5px solid #1a5f1a; }
        .arbi { font-size: 26px; text-align: right; color: #1a5f1a; margin: 12px 0; line-height: 1.8; }
        .tarjuma { font-size: 18px; color: #333; line-height: 1.7; }
        .key { font-weight: 700; color: #0d47a1; font-size: 20px; }
        h1 { text-align: center; color: #1a5f1a; margin: 20px 0; }
        .footer { text-align: center; margin: 30px 0; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>50 Mashhoor Hadees Ma Tarjuma</h1>
        <div id="hadees-list"></div>
        <div class="footer">Sadaqah Jariyah</div>
    </div>
    <script>
        const hadees_data = [
            {"key": "1. Niyyat", "hadees": "إِنَّمَا الأَعْمَالُ بِالنِّيَّاتِ، وَإِنَّمَا لِكُلِّ امْرِئٍ مَا نَوَى", "tarjuma": "Aamaal ka daromadar niyyaton par hai, aur har shakhs ke liye wahi hai jis ki us ne niyyat ki"},
            {"key": "2. Islam Ke Arkaan", "hadees": "بُنِيَ الْإِسْلَامُ عَلَى خَمْسٍ", "tarjuma": "Islam ki bunyad 5 cheezon par hai: Kalma, Namaz, Zakat, Hajj, Roza"},
            {"key": "3. Musalman Ki Pehchan", "hadees": "الْمُسْلِمُ مَنْ سَلِمَ الْمُسْلِمُونَ مِنْ لِسَانِهِ وَيَدِهِ", "tarjuma": "Musalman woh hai jis ki zuban aur haath se doosre musalman mehfooz rahen"},
            {"key": "4. Kamil Imaan", "hadees": "لَا يُؤْمِنُ أَحَدُكُمْ حَتَّى يُحِبَّ لِأَخِيهِ مَا يُحِبُّ لِنَفْسِهِ", "tarjuma": "Tum mein se koi momin nahi ho sakta jab tak apne bhai ke liye wahi pasand na kare jo apne liye pasand karta hai"},
            {"key": "5. Haya", "hadees": "الْحَيَاءُ مِنَ الْإِيمَانِ", "tarjuma": "Haya imaan ka hissa hai"},
            {"key": "6. Deen Asaan Hai", "hadees": "إِنَّ الدِّينَ يُسْرٌ", "tarjuma": "Beshak deen asaan hai"},
            {"key": "7. Ilm Farz Hai", "hadees": "طَلَبُ الْعِلْمِ فَرِيضَةٌ عَلَى كُلِّ مُسْلِمٍ", "tarjuma": "Ilm hasil karna har musalman par farz hai"},
            {"key": "8. Sachayi", "hadees": "عَلَيْكُمْ بِالصِّدْقِ", "tarjuma": "Sach ko lazim pakro, sach neki ki taraf le jata hai"},
            {"key": "9. Muskurahat", "hadees": "تَبَسُّمُكَ فِي وَجْهِ أَخِيكَ لَكَ صَدَقَةٌ", "tarjuma": "Apne bhai ke samne muskurana bhi sadqa hai"},
            {"key": "10. Salam Aam Karo", "hadees": "أَفْشُوا السَّلَامَ بَيْنَكُمْ", "tarjuma": "Apas mein salam ko aam karo"},
            {"key": "11. Sabr", "hadees": "عَجَبًا لِأَمْرِ الْمُؤْمِنِ", "tarjuma": "Momin ka mamla ajab hai, us ka har kaam khair hai"},
            {"key": "12. Maa Ka Darja", "hadees": "الْجَنَّةُ تَحْتَ أَقْدَامِ الْأُمَّهَاتِ", "tarjuma": "Jannat maaon ke qadmon tale hai"},
            {"key": "13. Dua Ibadat Hai", "hadees": "الدُّعَاءُ هُوَ الْعِبَادَةُ", "tarjuma": "Dua hi ibadat hai"},
            {"key": "14. Quran Sikhana", "hadees": "خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ", "tarjuma": "Tum mein behtareen woh hai jo Quran seekhe aur sikhaye"},
            {"key": "15. Tauba", "hadees": "كُلُّ ابْنِ آدَمَ خَطَّاءٌ", "tarjuma": "Har insan khatakar hai, aur behtareen khatakar tauba karne wale hain"},
            {"key": "16. Allah Ki Rehmat", "hadees": "إِنَّ رَحْمَتِي سَبَقَتْ غَضَبِي", "tarjuma": "Meri rehmat mere ghazab par sabqat le gayi hai"},
            {"key": "17. Jahannam Se Bachao", "hadees": "اتَّقُوا النَّارَ وَلَوْ بِشِقِّ تَمْرَةٍ", "tarjuma": "Jahannam se bacho chahay khajoor ke ek tukre se hi"},
            {"key": "18. Narmi", "hadees": "إِنَّ اللَّهَ رَفِيقٌ يُحِبُّ الرِّفْقَ", "tarjuma": "Allah naram hai aur har kaam mein narmi ko pasand karta hai"},
            {"key": "19. Sadaqah", "hadees": "الصَّدَقَةُ تُطْفِئُ الْخَطِيئَةَ", "tarjuma": "Sadqa gunah ko is tarah bujha deta hai jaise pani aag ko"},
            {"key": "20. Walidain Ki Raza", "hadees": "رِضَا الرَّبِّ فِي رِضَا الْوَالِدِ", "tarjuma": "Rab ki raza walid ki raza mein hai"},
            {"key": "21. Yateem Ki Kafalat", "hadees": "أَنَا وَكَافِلُ الْيَتِيمِ فِي الْجَنَّةِ هَكَذَا", "tarjuma": "Main aur yateem ki kafalat karne wala jannat mein is tarah honge"},
            {"key": "22. Padosi Ka Haq", "hadees": "مَا زَالَ جِبْرِيلُ يُوصِينِي بِالْجَارِ", "tarjuma": "Jibreel mujhe padosi ke baare mein waseeat karte rahe yahan tak ke mujhe laga ke use waris bana denge"},
            {"key": "23. Khana Khilana", "hadees": "أَطْعِمُوا الطَّعَامَ", "tarjuma": "Khana khilao, salam aam karo, aur raat ko jab log so rahe hon namaz parho to jannat mein salaamati se dakhil hoge"},
            {"key": "24. Gheebat", "hadees": "أَتَدْرُونَ مَا الْغِيبَةُ", "tarjuma": "Kya tum jante ho gheebat kya hai? Apne bhai ka zikr is tarah karna jo use napasand ho"},
            {"key": "25. Hasad", "hadees": "إِيَّاكُمْ وَالْحَسَدَ", "tarjuma": "Hasad se bacho, kyunki hasad nekiyon ko is tarah kha jata hai jaise aag lakri ko"},
            {"key": "26. Gussa", "hadees": "لَا تَغْضَبْ", "tarjuma": "Gussa na karo. Ek shakhs ne naseehat maangi to farmaya: Gussa na karo"},
            {"key": "27. Mazloom Ki Baddua", "hadees": "اتَّقُوا دَعْوَةَ الْمَظْلُومِ", "tarjuma": "Mazloom ki baddua se bacho, us ke aur Allah ke darmiyan koi parda nahi"},
            {"key": "28. Aasaniyan Paida Karo", "hadees": "يَسِّرُوا وَلَا تُعَسِّرُوا", "tarjuma": "Aasaniyan paida karo, mushkilat na paida karo. Khushkhabri do, nafrat na dilao"},
            {"key": "29. Wafaadari", "hadees": "آيَةُ الْمُنَافِقِ ثَلَاثٌ", "tarjuma": "Munafiq ki 3 nishaniyan: jab baat kare jhoot bole, wada kare to khilaf warzi kare, amaanat rakhi jaye to khayanat kare"},
            {"key": "30. Halal Kamaai", "hadees": "طَلَبُ الْحَلَالِ فَرِيضَةٌ", "tarjuma": "Halal rozi talab karna farz hai"},
            {"key": "31. Zulm", "hadees": "اتَّقُوا الظُّلْمَ", "tarjuma": "Zulm se bacho, kyunki zulm qayamat ke din andheriyan hoga"},
            {"key": "32. Rizq Ki Kunjiyan", "hadees": "لَوْ أَنَّكُمْ تَتَوَكَّلُونَ عَلَى اللَّهِ حَقَّ تَوَكُّلِهِ", "tarjuma": "Agar tum Allah par bharosa karo jaisa bharosa karne ka haq hai, to woh tumhein is tarah rizq dega jaise parindon ko deta hai"},
            {"key": "33. Behtareen Log", "hadees": "خِيَارُكُمْ أَحَاسِنُكُمْ أَخْلَاقًا", "tarjuma": "Tum mein behtareen woh hain jin ke akhlaq sab se achay hain"},
            {"key": "34. Momin Ka Aina", "hadees": "الْمُؤْمِنُ مِرْآةُ الْمُؤْمِنِ", "tarjuma": "Momin momin ka aina hai"},
            {"key": "35. Zuban Ki Hifazat", "hadees": "مَنْ كَانَ يُؤْمِنُ بِاللَّهِ وَالْيَوْمِ الْآخِرِ فَلْيَقُلْ خَيْرًا أَوْ لِيَصْمُتْ", "tarjuma": "Jo Allah aur akhirat par imaan rakhta ho, woh achi baat kahe ya khamosh rahe"},
            {"key": "36. Allah Ka Zikr", "hadees": "مَثَلُ الَّذِي يَذْكُرُ رَبَّهُ وَالَّذِي لَا يَذْكُرُ", "tarjuma": "Jo apne Rab ko yaad karta hai aur jo nahi karta, un ki misaal zinda aur murda ki si hai"},
            {"key": "37. Namaz", "hadees": "الْعَهْدُ الَّذِي بَيْنَنَا وَبَيْنَهُمُ الصَّلَاةُ", "tarjuma": "Hamare aur un ke darmiyan ahd namaz hai, jis ne ise chhor diya us ne kufr kiya"},
            {"key": "38. Beemari Ka Kafara", "hadees": "مَا يُصِيبُ الْمُسْلِمَ مِنْ نَصَبٍ وَلَا وَصَبٍ", "tarjuma": "Musalman ko jo thakawat, beemari, gham, takleef pahunchti hai, yahan tak ke kaanta bhi chubhe, Allah us ke zariye us ke gunah mita deta hai"},
            {"key": "39. Shukr", "hadees": "مَنْ لَمْ يَشْكُرِ النَّاسَ لَمْ يَشْكُرِ اللَّهَ", "tarjuma": "Jo logon ka shukr ada nahi karta, woh Allah ka shukr ada nahi karta"},
            {"key": "40. Qana'at", "hadees": "لَيْسَ الْغِنَى عَنْ كَثْرَةِ الْعَرَضِ", "tarjuma": "Maaldaari maal ki kasrat se nahi, asal maaldaari dil ki be-niyazi hai"},
            {"key": "41. Jannat Ka Rasta", "hadees": "مَنْ سَلَكَ طَرِيقًا يَلْتَمِسُ فِيهِ عِلْمًا", "tarjuma": "Jo ilm ke raste par chalta hai, Allah us ke liye jannat ka rasta aasan kar deta hai"},
            {"key": "42. Nek Aamaal", "hadees": "أَحَبُّ الْأَعْمَالِ إِلَى اللَّهِ أَدْوَمُهَا وَإِنْ قَلَّ", "tarjuma": "Allah ko sab se zyada mehboob woh amal hai jo hamesha kiya jaye, agarche kam ho"},
            {"key": "43. Rizq Mein Barakat", "hadees": "مَنْ أَحَبَّ أَنْ يُبْسَطَ لَهُ فِي رِزْقِهِ", "tarjuma": "Jo chahta hai ke us ka rizq kushada ho aur umar daraz ho, woh sila rehmi kare"},
            {"key": "44. Takabbur", "hadees": "لَا يَدْخُلُ الْجَنَّةَ مَنْ كَانَ فِي قَلْبِهِ مِثْقَالُ ذَرَّةٍ مِنْ كِبْرٍ", "tarjuma": "Jis ke dil mein zarra barabar takabbur hoga, woh jannat mein dakhil nahi hoga"},
            {"key": "45. Neki Ka Irada", "hadees": "مَنْ هَمَّ بِحَسَنَةٍ فَلَمْ يَعْمَلْهَا", "tarjuma": "Jo neki ka irada kare aur na kar sake, us ke liye ek neki likh di jati hai"},
            {"key": "46. Duniya Se Be-raghbati", "hadees": "كُنْ فِي الدُّنْيَا كَأَنَّكَ غَرِيبٌ", "tarjuma": "Duniya mein is tarah raho jaise tum musafir ya raahgeer ho"},
            {"key": "47. Haqeeqi Pehlwan", "hadees": "لَيْسَ الشَّدِيدُ بِالصُّرَعَةِ", "tarjuma": "Taakatwar woh nahi jo pachar de, taakatwar woh hai jo gusse ke waqt apne aap par qabu rakhay"},
            {"key": "48. Humsaya Se Husn-e-Salook", "hadees": "مَنْ كَانَ يُؤْمِنُ بِاللَّهِ وَالْيَوْمِ الْآخِرِ فَلْيُكْرِمْ جَارَهُ", "tarjuma": "Jo Allah aur akhirat par imaan rakhta ho, woh apne padosi ki izzat kare"},
            {"key": "49. Tark-e-Laa Yani", "hadees": "مِنْ حُسْنِ إِسْلَامِ الْمَرْءِ تَرْكُهُ مَا لَا يَعْنِيهِ", "tarjuma": "Insan ke islam ki khoobi ye hai ke woh laa yani baaton ko chhor de"},
            {"key": "50. Aakhri Naseehat", "hadees": "قُلْ آمَنْتُ بِاللَّهِ ثُمَّ اسْتَقِمْ", "tarjuma": "Kaho: Main Allah par imaan laya, phir is par isteqamat ikhtiyar karo"}
        ];
        const list = document.getElementById('hadees-list');
        hadees_data.forEach(h => {
            list.innerHTML += `<div class="hadees"><div class="key">${h.key}</div><div class="arbi">${h.hadees}</div><div class="tarjuma">${h.tarjuma}</div></div>`;
        });
    </script>
</body>
</html>
